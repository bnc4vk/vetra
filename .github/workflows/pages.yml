name: Deploy Vetra

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vetra-production
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build production frontend
        env:
          VITE_BASE_PATH: /vetra/
          VITE_API_BASE_URL: ${{ vars.VETRA_API_BASE_URL }}
        run: npm run build
      - name: Test itinerary contract
        run: npm run test:itinerary
      - name: Test result continuity
        run: npm run test:results
      - name: Test local billing safety
        run: npm run test:safety
      - name: Test hosted safety
        run: npm run test:hosted-safety

  deploy-api:
    name: Deploy API
    needs: validate
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    outputs:
      deployment-url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install pinned Vercel CLI
        run: npm install --global vercel@56.4.1
      - name: Link production project
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Record current production deployment
        id: previous
        env:
          VETRA_API_BASE_URL: ${{ vars.VETRA_API_BASE_URL }}
        run: |
          previous_url="$(vercel inspect "$VETRA_API_BASE_URL" --format json --token="$VERCEL_TOKEN" | node -e 'let input=""; process.stdin.on("data", chunk => input += chunk); process.stdin.on("end", () => process.stdout.write(JSON.parse(input).url));')"
          echo "url=$previous_url" >> "$GITHUB_OUTPUT"
      - name: Upload candidate API without promotion
        id: deploy
        run: |
          deployment_url="$(vercel deploy --prod --skip-domain --yes --no-wait --token="$VERCEL_TOKEN" --env VETRA_DEPLOYMENT_SHA="$GITHUB_SHA" --meta githubCommitSha="$GITHUB_SHA")"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
      - name: Wait for candidate deployment
        run: vercel inspect "${{ steps.deploy.outputs.url }}" --wait --timeout 3m --token="$VERCEL_TOKEN"
      - name: Verify candidate API before promotion
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
          EXPECTED_DEPLOYMENT_SHA: ${{ github.sha }}
        run: |
          health_json="$(vercel curl "/api/health?revision=$GITHUB_SHA" --deployment "$DEPLOYMENT_URL" --token="$VERCEL_TOKEN" -- --silent --show-error)"
          VETRA_API_HEALTH_JSON="$health_json" npm run test:hosted-contract
      - name: Promote verified API
        id: promote
        run: vercel promote "${{ steps.deploy.outputs.url }}" --yes --timeout 3m --token="$VERCEL_TOKEN"
      - name: Verify production API alias
        env:
          EXPECTED_DEPLOYMENT_SHA: ${{ github.sha }}
          VETRA_API_BASE_URL: ${{ vars.VETRA_API_BASE_URL }}
        run: npm run test:hosted-contract
      - name: Restore previous API deployment
        id: rollback
        if: failure() && steps.promote.outcome != 'skipped'
        run: vercel rollback "${{ steps.previous.outputs.url }}" --yes --timeout 3m --token="$VERCEL_TOKEN"
      - name: Verify restored API
        if: failure() && steps.rollback.outcome == 'success'
        env:
          VETRA_API_BASE_URL: ${{ vars.VETRA_API_BASE_URL }}
        run: npm run test:hosted-contract

  deploy-pages:
    name: Deploy Pages
    needs: [validate, deploy-api]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build Vetra
        env:
          VITE_BASE_PATH: /vetra/
          VITE_API_BASE_URL: ${{ vars.VETRA_API_BASE_URL }}
        run: npm run build
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify public site
        run: curl --fail --silent --show-error --retry 10 --retry-all-errors --retry-delay 3 "${{ steps.deployment.outputs.page_url }}" > /dev/null

  record-failure:
    name: Record deployment failure
    if: always() && (needs.validate.result == 'failure' || needs.deploy-api.result == 'failure' || needs.deploy-pages.result == 'failure')
    needs: [validate, deploy-api, deploy-pages]
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Create deployment failure issue
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const shortSha = context.sha.slice(0, 7)
            const title = `Production deployment failed for ${shortSha}`
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`
            const body = [
              `@${context.actor}, the production release for commit ${context.sha} failed.`,
              '',
              `Workflow: ${runUrl}`,
              `Validation: ${{ needs.validate.result }}`,
              `API deployment: ${{ needs.deploy-api.result }}`,
              `Pages deployment: ${{ needs.deploy-pages.result }}`,
              '',
              'The Vercel production alias remains on, or was restored to, the last verified backend deployment. Fix forward from `main`; no automatic revert commit was created.',
            ].join('\n')

            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'deployment-failure' })
            } catch (error) {
              if (error.status !== 404) throw error
              await github.rest.issues.createLabel({ owner, repo, name: 'deployment-failure', color: 'b60205' })
            }

            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'all',
              labels: 'deployment-failure',
              per_page: 100,
            })
            if (!existing.data.some((issue) => issue.title === title)) {
              await github.rest.issues.create({ owner, repo, title, body, labels: ['deployment-failure'] })
            }
