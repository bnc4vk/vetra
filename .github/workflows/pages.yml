name: Deploy public preview

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: public-preview
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build Vetra
        env:
          VITE_BASE_PATH: /vetra-pages/
          VITE_API_BASE_URL: ${{ vars.VETRA_API_BASE_URL }}
        run: npm run build
      - name: Publish compiled site
        env:
          DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/vetra-pages
          chmod 600 ~/.ssh/vetra-pages
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          cd dist
          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy ${GITHUB_SHA}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/vetra-pages -o IdentitiesOnly=yes" \
            git push --force git@github.com:bnc4vk/vetra-pages.git main
